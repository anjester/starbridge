<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>StarBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#ffd34d;--gold2:#f7a800;--red:#e83030;
  --navy:#04122d;--txt:#fff;--muted:rgba(226,239,255,.6);
  --nav-h:96px;--ad-h:52px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;
  background:linear-gradient(180deg,#061a42 0%,#04122d 55%,#020b1f 100%);
  color:#fff;font-family:'DM Sans',system-ui,sans-serif}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  transition:opacity .7s ease;
}
#splash img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
#splash::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),transparent 45%)}
.sp-loader{position:relative;z-index:1;width:min(300px,80%);margin-bottom:50px;text-align:center}
.sp-msg{color:rgba(255,211,77,.75);font-family:'Syne',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.sp-track{height:4px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
.sp-fill{height:100%;width:0%;background:linear-gradient(90deg,#f7b500,#ffd34d);border-radius:999px;transition:width .4s ease}

/* SFONDO FUOCO */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 65% at 92% 12%,rgba(255,130,0,.72),transparent 52%),
    radial-gradient(ellipse 48% 38% at 75% 3%,rgba(255,220,0,.42),transparent 44%),
    radial-gradient(ellipse 40% 32% at 100% 28%,rgba(255,60,0,.52),transparent 40%),
    radial-gradient(ellipse 75% 42% at 50% 98%,rgba(6,14,45,.92),transparent 62%),
    #060606;}
.spark{position:absolute;border-radius:50%;pointer-events:none;
  animation:sparkAnim var(--d,3s) var(--dl,0s) ease-in-out infinite}
@keyframes sparkAnim{0%{opacity:0;transform:translate(0,0) scale(.4)}25%{opacity:.85}100%{opacity:0;transform:translate(var(--tx,0px),var(--ty,-90px)) scale(2)}}

/* SCHERMATE */
.screen{position:fixed;inset:0;z-index:1;
  padding-bottom:calc(var(--nav-h) + var(--ad-h) + var(--safe-bot));
  padding-top:var(--safe-top);
  transition:opacity .25s ease,transform .25s ease;
  overflow:hidden;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateX(14px)}

/* HOME */
.topbar{display:flex;align-items:center;justify-content:center;
  gap:8px;padding:7px 14px 2px;flex-shrink:0}
.counter{display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.13);
  border-radius:999px;padding:5px 10px 5px 7px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.counter img{width:22px;height:22px;object-fit:contain}
.plus{width:20px;height:20px;border-radius:999px;
  background:rgba(255,255,255,.16);display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;
  color:rgba(255,255,255,.82);margin-left:2px;cursor:pointer}
.home-scroll{flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0 8px 4px;scrollbar-width:none;display:flex;flex-direction:column}
.home-scroll::-webkit-scrollbar{display:none}
.logo-wrap{text-align:center;padding:2px 0 5px;flex-shrink:0}
.logo-wrap img{width:min(260px,72vw);object-fit:contain;
  filter:drop-shadow(0 4px 22px rgba(255,180,0,.45))}
.grid{display:grid;grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;gap:6px;flex:1;min-height:0}
.card-wrap{cursor:pointer;border-radius:16px;overflow:hidden;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 18px rgba(0,0,0,.55);display:flex;align-items:stretch}
.card-wrap:active{transform:scale(.96)}
.card-wrap img{width:100%;height:100%;object-fit:cover;display:block;border-radius:16px}
.home-wrap{height:100%;display:flex;flex-direction:column}

/* PLACEHOLDER SCHERMATE */
.placeholder{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;height:100%;
  background:linear-gradient(180deg,#061a42,#04122d)}
.ph-icon{font-size:52px}
.ph-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;
  letter-spacing:-.04em;color:var(--gold)}
.ph-sub{color:var(--muted);font-size:14px;text-align:center}

/* AD */
.ad-bar{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot));
  left:0;right:0;height:var(--ad-h);background:rgba(236,236,236,.97);
  display:flex;align-items:center;justify-content:center;
  z-index:90;border-top:1px solid rgba(0,0,0,.1)}
.ad-bar span{color:#bbb;font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;font-weight:600}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bot));
  background:rgba(5,8,20,.97);backdrop-filter:blur(22px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-around;
  padding:6px 8px calc(6px + var(--safe-bot));z-index:100;gap:5px}
.nav-btn{flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;border:none;background:none;
  padding:0;max-width:76px;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.nav-btn:active{transform:scale(.9)}
.nav-btn.active{transform:translateY(-3px) scale(1.06)}
.nav-btn img{width:min(72px,15vw);height:min(72px,15vw);object-fit:contain;
  transition:filter .2s ease}
.nav-btn.active img{filter:drop-shadow(0 0 8px rgba(255,200,50,.6)) brightness(1.12)}

/* GIOCO (stilizzato dal v7) */
.panel{border:1px solid rgba(86,167,255,.15);background:rgba(9,28,68,.72);
  border-radius:24px;padding:16px;backdrop-filter:blur(20px)}
.game-scroll{height:100%;overflow-y:auto;overflow-x:hidden;
  padding:12px;scrollbar-width:none;display:flex;gap:14px}
.game-scroll::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<!-- SFONDO -->
<div class="bg" id="bg"></div>

<!-- SPLASH -->
<div id="splash">
  <img id="splashImg" src="" alt="StarBridge"/>
  <div class="sp-loader">
    <div class="sp-msg" id="spMsg">Caricamento in corso...</div>
    <div class="sp-track"><div class="sp-fill" id="spFill"></div></div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screenHome">
  <div class="home-wrap">
    <div class="topbar">
      <div class="counter"><img id="icOscar" src="" alt=""/><span id="oscarCount">1.618</span></div>
      <div class="counter"><img id="icPopcorn" src="" alt=""/><span>25</span><div class="plus">+</div></div>
      <div class="counter" style="color:#ff7070"><span style="font-size:17px">❤️</span><span>5</span><div class="plus">+</div></div>
    </div>
    <div class="home-scroll">
      <div class="logo-wrap"><img id="logoImg" src="" alt="StarBridge"/></div>
      <div class="grid">
        <div class="card-wrap" onclick="goTo('play')"><img id="cardSfida" src="" alt="Sfida del Giorno"/></div>
        <div class="card-wrap" onclick="goTo('play')"><img id="cardModes" src="" alt="Modalità di Gioco"/></div>
        <div class="card-wrap" onclick="goTo('mondo')"><img id="cardPopcorn" src="" alt="Pop Corn"/></div>
        <div class="card-wrap" onclick="goTo('rank')"><img id="cardOscar" src="" alt="Oscar Collection"/></div>
      </div>
    </div>
  </div>
</div>

<!-- GIOCA -->
<div class="screen hidden" id="screenPlay">
  <div style="height:100%;overflow-y:auto;padding:12px;scrollbar-width:none">
    <!-- Il gioco viene iniettato qui via JS -->
    <div id="gameContainer"></div>
  </div>
</div>

<!-- CLASSIFICA -->
<div class="screen hidden" id="screenRank">
  <div class="placeholder">
    <div class="ph-icon">🏆</div>
    <div class="ph-title">Classifica</div>
    <div class="ph-sub">In arrivo — chi ha collezionato più Oscar?</div>
  </div>
</div>

<!-- MONDO -->
<div class="screen hidden" id="screenMondo">
  <div class="placeholder">
    <div class="ph-icon">🍿</div>
    <div class="ph-title">Mondo Pop Corn</div>
    <div class="ph-sub">In arrivo — scala la progressione fino all'Oscar.</div>
  </div>
</div>

<!-- PROFILO -->
<div class="screen hidden" id="screenProfile">
  <div class="placeholder">
    <div class="ph-icon">👤</div>
    <div class="ph-title">Profilo</div>
    <div class="ph-sub">In arrivo — statistiche e impostazioni.</div>
  </div>
</div>

<!-- AD -->
<div class="ad-bar"><span>Pubblicità</span></div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="btn-home" onclick="goTo('home')"><img id="btnHome" src="" alt="Home"/></button>
  <button class="nav-btn" id="btn-rank" onclick="goTo('rank')"><img id="btnRank" src="" alt="Classifica"/></button>
  <button class="nav-btn" id="btn-play" onclick="goTo('play')"><img id="btnPlay" src="" alt="Gioca"/></button>
  <button class="nav-btn" id="btn-mondo" onclick="goTo('mondo')"><img id="btnMondo" src="" alt="Popcorn"/></button>
  <button class="nav-btn" id="btn-profile" onclick="goTo('profile')"><img id="btnProfile" src="" alt="Profilo"/></button>
</nav>

<script src="assets.js"></script>
<script src="game.js"></script>
<script>
// ── NAVIGAZIONE ──
const SCREENS = {
  home:    'screenHome',
  play:    'screenPlay',
  rank:    'screenRank',
  mondo:   'screenMondo',
  profile: 'screenProfile',
};
let currentTab = 'home';

function goTo(tab) {
  // Nascondi tutti
  Object.values(SCREENS).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('hidden');
  });
  // Mostra target
  const target = document.getElementById(SCREENS[tab]);
  if (target) target.classList.remove('hidden');
  // Nav active
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + tab);
  if (btn) btn.classList.add('active');
  currentTab = tab;
}

// ── INJECT IMMAGINI ──
function injectImages() {
  if (typeof IMG === 'undefined' || typeof EXTRA === 'undefined') return;
  // Top bar
  const icO = document.getElementById('icOscar');    if(icO) icO.src = EXTRA.oscar_sm || '';
  const icP = document.getElementById('icPopcorn');  if(icP) icP.src = EXTRA.popcorn_sm || '';
  // Logo
  const lg = document.getElementById('logoImg');     if(lg) lg.src = EXTRA.logo || '';
  // Cards
  const cs = document.getElementById('cardSfida');   if(cs) cs.src = IMG.card_sfida || '';
  const cm = document.getElementById('cardModes');   if(cm) cm.src = IMG.card_modes || '';
  const cp = document.getElementById('cardPopcorn'); if(cp) cp.src = IMG.card_popcorn || '';
  const co = document.getElementById('cardOscar');   if(co) co.src = IMG.card_oscar || '';
  // Nav
  const bh = document.getElementById('btnHome');     if(bh) bh.src = IMG.btn_home || '';
  const br = document.getElementById('btnRank');     if(br) br.src = IMG.btn_rank || '';
  const bp = document.getElementById('btnPlay');     if(bp) bp.src = IMG.btn_play || '';
  const bm = document.getElementById('btnMondo');    if(bm) bm.src = IMG.btn_popcorn || '';
  const bf = document.getElementById('btnProfile');  if(bf) bf.src = IMG.btn_profilo || '';
  // Splash
  const si = document.getElementById('splashImg');
  if(si && typeof SPLASH_B64 !== 'undefined') si.src = SPLASH_B64;
}

// ── SPLASH ──
function runSplash() {
  const splash = document.getElementById('splash');
  const fill   = document.getElementById('spFill');
  const msg    = document.getElementById('spMsg');
  if (!splash) return;
  const steps = [
    [200,  15, 'Preparando il database...'],
    [600,  40, 'Caricando gli attori...'],
    [1100, 65, 'Collegando i film...'],
    [1600, 88, 'Quasi pronto...'],
    [2100, 100,'Pronti!'],
  ];
  steps.forEach(([d,p,t]) => setTimeout(() => {
    if(fill) fill.style.width = p+'%';
    if(msg)  msg.textContent = t;
  }, d));
  setTimeout(() => {
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 700);
  }, 2400);
}

// ── PARTICELLE ──
function spawnSparks() {
  const bg = document.getElementById('bg');
  if (!bg) return;
  const colors = ['#ff9900','#ffcc00','#ff6600','#ffee44','#ff3300'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const x = 62 + Math.random()*32, y = Math.random()*42;
    const tx = (Math.random()-.5)*55, ty = -(28+Math.random()*95);
    const d = (2.2+Math.random()*3.8).toFixed(1)+'s';
    const dl = (Math.random()*4.5).toFixed(1)+'s';
    const sz = (1+Math.random()*2.8).toFixed(1);
    s.style.cssText = `left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --d:${d};--dl:${dl};--tx:${tx}px;--ty:${ty}px;
      box-shadow:0 0 4px 1px rgba(255,150,0,.55);`;
    bg.appendChild(s);
  }
}

// ── AVVIO ──
injectImages();
spawnSparks();
runSplash();
</script>
</body>
</html>
